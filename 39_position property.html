<!DOCTYPE html>
<html>
<head>

<title>CSS Position</title>

<style>

body{
    margin:0;
    font-family:Arial;
}

.header{
    position:sticky;
    top:0;
    background:navy;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    position:relative;
    width:700px;
    height:400px;
    margin:50px auto;
    background:#dddddd;
    border:3px solid black;
}

.absoluteBox{
    position:absolute;
    top:50px;
    left:100px;
    width:150px;
    height:150px;
    background:red;
    color:white;
    text-align:center;
    line-height:150px;
}

.relativeBox{
    position:relative;
    left:250px;
    top:30px;
    width:150px;
    height:150px;
    background:green;
    color:white;
    text-align:center;
    line-height:150px;
}
