<!DOCTYPE html>
<html>
<head>
<title>JSPM Logo</title>

<style>
.logo{
    width:220px;
    height:220px;
    background:linear-gradient(to bottom,#ff9933,#138808);
    border:6px solid navy;
    border-radius:50%;
    margin:100px auto;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 15px gray;
}

.logo h1{
    color:white;
    font-size:50px;
    font-family:Arial,sans-serif;
    font-weight:bold;
    text-shadow:2px 2px 5px black;
}
</style>

</head>

<body>

<div class="logo">
    <h1>JSPM</h1>
</div>

</body>
</html>
