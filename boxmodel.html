<!DOCTYPE html>
<html>
<head>
<title>CSS Box Model</title>

<style>

body{
    background-color:#dff6ff;
    font-family:Arial, sans-serif;
}

.box{
    width:500px;
    margin:60px auto;
    padding:25px;
    border:6px double darkred;
    background-color:#fff8dc;
    color:#2f4f4f;
    text-align:center;
    border-radius:15px;
}

h1{
    color:#ff4500;
    text-transform:uppercase;
}

p{
    font-size:20px;
    line-height:30px;
}

</style>

</head>

<body>

<div class="box">

<h1>My Dream Garden</h1>

<p>
A beautiful garden is full of colorful flowers, green trees, fresh air, and singing birds.
It gives peace, happiness, and a healthy environment for everyone.
</p>

</div>

</body>
</html>
