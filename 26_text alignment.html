<!DOCTYPE html>
<html>

<head>

<style>

h1{
text-align:center;
}

h2{
text-align:right;
}

p{
text-align:justify;
}

</style>

</head>

<body>

<h1>Center Heading</h1>

<h2>Right Heading</h2>

<p>
CSS Typography is very important for improving readability.
This paragraph is aligned using justify.
</p>

</body>

</html>
